# Local-first stack (docs/infrastructure/infrastructure-design.md §1).
# Sprint 1 brings up the data layer (Postgres+pgvector, Redis). App services
# (api, worker, dashboard, mcp) are added as they're built in later sprints.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobagent
      POSTGRES_PASSWORD: jobagent
      POSTGRES_DB: jobagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Reference schema is applied on first init (docs/database/schema.sql is canonical
      # until Prisma migrations take over in T-004).
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobagent -d jobagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
